<!-- Modal forgot password partial -->

<style>
    #ModalForgotPassword #user-name {
        margin-bottom: 10px;
    }
    #ModalForgotPassword .alert {
        margin-bottom: 10px;
    }
</style>
<!-- Modal -->
<div class="modal fade" id="ModalForgotPassword" tabindex="-1" role="dialog" aria-labelledby="myModalLabel">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
            <div class="modal-header clearfix">
                <h4 class="modal-title pull-left" id="myModalLabel">Thông tin Yêu cầu mật khẩu mới</h4>
                <button type="button" class="close pull-right" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">×</span></button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-12" id="error-message">
                    </div>
                </div>
                <div class="row">
                    
                    <div class="col-md-12">
                        <input class="form-control" id="user-name" name="UserName" placeholder="Tên tài khoản (*)" type="text" value="">
                    </div>
                </div>
                <div class="row">
                    
                    <div class="col-md-12">
                        <input class="form-control" id="email" name="Email" placeholder="Email (*)" type="text" value="">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" id="btn-forgot-password">Yêu cầu mật khẩu mới</button>
                
            </div>
        </div>
    </div>
</div>
<!-- End Modal -->

<script>

    function addMessage(message, type) {
        if (message == '' || message == undefined) return;
        var html = '';
        if (type === false) {
            html = '<div class="alert alert-danger">'+message+'</div>';
        }
        else if (type === true) {
            html = '<div class="alert alert-success">' + message + '</div>';
        }
        $('#ModalForgotPassword #error-message').html(html);
    }

    function validateFormForgotPassword() {
        var message = '';
        var errorType = true;
        if ($('#ModalForgotPassword #user-name').val() === '') {
            message = $translate('log-in.please-enter-account-name', 'Vui lòng nhập Tên tài khoản!', 'Please enter account name!');
            errorType = false;
            $('#ModalForgotPassword #user-name').focus();
        }
        else if ($('#ModalForgotPassword #email').val() === '') {
            message = $translate('log-in.please-enter-email', 'Vui lòng nhập Email!', 'Please enter Email!');
            errorType = false;
            $('#ModalForgotPassword #email').focus();
        }

        if (message != '') {
            addMessage(message, errorType);
            return false;
        }
        return true;
    }
    $(function () {
        $('#btn-forgot-password').click(function () {
            if (validateFormForgotPassword()) {
                $.ajax({
                    url: '/Popular/ForgotPassword',
                    type: 'POST',
                    data: { Username: $('#ModalForgotPassword #user-name').val(), email: $('#ModalForgotPassword #email').val() },
                    success: function (response) {
                        addMessage(response.Message.ErrorMessage, response.Message.Result);
                    },
                    error: function () {
                        addMessage($translate('log-in.sabre-command.network-error', 'Lỗi đường truyền!', 'Network error!'), false);
                    },
                    complete: function () {
                    }
                });
            }
        });
    });
</script>



<script type="text/javascript">
    $(document).ready(function () {
        $('#Captcha').children('a').attr('tabindex', '-1');
        $('input[name="CaptchaInputText"]').attr('placeholder', 'Mã captcha');
        let isAgentLogin = 'true';
        if (isAgentLogin.toLowerCase() =="true") {
            $('#formLoginAgent').show();
            $('#formLoginUser').hide();
            $('#linkLoginAgent').hide(0);
            $('#linkLoginUser').hide(0);
            $('#formLoginAgent input[name="username"]').focus();
        }
        else {
            $('#formLoginAgent').hide();
            $('#formLoginUser').show();
            $('#linkLoginAgent').show(0);
            $('#linkLoginUser').hide(0);
            $('#formLoginUser input[name="username"]').focus();
        }
        $('#btn-call-modal-forgotpassword').click(function () {
            if ($('#ModalForgotPassword').length > 0)
                $('#ModalForgotPassword').modal('show');
            else
                location.href = '/Popular/ForgotPassword';
        });

        $('#linkLoginAgent').click(function () {
            $('#is-agent-login').val(false);
            $('#formLoginAgent').show();
            $('#formLoginUser').hide();
            $('#linkLoginAgent').hide(0);
            $('#linkLoginUser').show(0);
            $('#formLoginAgent input[name="username"]').focus();
        });

        $('#linkLoginUser').click(function () {
            $('#is-agent-login').val(true);
            $('#formLoginAgent').hide();
            $('#formLoginUser').show();
            $('#linkLoginAgent').show(0);
            $('#linkLoginUser').hide(0);
            $('#formLoginUser input[name="username"]').focus();
        });
        $('#btn-login-user').click(function () {
            $('#is-agent-login').val(true);
        });
        $('#btn-login-agent').click(function () {
            $('#is-agent-login').val(false);
        });


    });
    function showError() {
        document.getElementById('showError').style.display = "block";
    }

</script>
