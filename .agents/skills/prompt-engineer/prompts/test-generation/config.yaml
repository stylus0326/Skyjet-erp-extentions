domain: test-generation
description: "Generate comprehensive test suites with high coverage using pytest, Jest, and JUnit frameworks"

model:
  primary: claude-3-5-sonnet
  fallback: claude-3-haiku

temperature: 0.2
max_tokens: 4000
output_schema: json

source_prompts: 68
contributors: 8

techniques:
  - few-shot
  - structured-output
  - test-driven-development

quality_bars:
  accuracy: 0.85
  format_compliance: 0.95
  coverage_target: 85

tags:
  - testing
  - QA
  - unit-test
  - integration-test
  - e2e
  - TDD
  - coverage
  - pytest
  - jest
  - junit

frameworks:
  - pytest
  - jest
  - junit
  - unittest
  - mocha
  - rspec
